<!DOCTYPE html>
<html>
  <body>

    <button onclick="generateNumbers()">Generate 4 Numbers</button>

  <p>Output 1: <span id="output1"></span></p>
  <p>Output 2: <span id="output2"></span></p>
  <p>Output 3: <span id="output3"></span></p>
  <p>Output 4: <span id="output4"></span></p>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
  <iframe src="https://example.com"></iframe>
  <iframe src="https://example.org"></iframe>
  <iframe src="https://example.net"></iframe>
  <iframe src="https://example.edu"></iframe>
</div>

  </body>
  <script>
    const generatedNumbers = new Set();

    function generateRandom10Digit() {
      return Math.floor(1000000000 + Math.random() * 9000000000);
    }

    function generateNumbers() {
      let results = [];

      while (results.length < 4) {
        let num = generateRandom10Digit();

        if (!generatedNumbers.has(num)) {
          generatedNumbers.add(num);
          results.push(num);
        }
      }

      // assign to separate outputs
      document.getElementById("output1").textContent = results[0];
      document.getElementById("output2").textContent = results[1];
      document.getElementById("output3").textContent = results[2];
      document.getElementById("output4").textContent = results[3];
    }
  </script>
</html>
