<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 5px;
    }

    .frame-container {
      position: relative;
      overflow: hidden;
      border: 1px solid #ccc;
    }

    .iframe-wrapper {
      width: 100%;
      height: 100%;
      transform-origin: top left;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .controls {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0,0,0,0.6);
      padding: 5px;
      border-radius: 5px;
    }

    .controls button {
      color: white;
      background: transparent;
      border: 1px solid white;
      margin: 2px;
      cursor: pointer;
    }
  </style>
</head>
  <body>
    <button onclick="generateNumbers()">Generate 4 Numbers</button><br>
    
    <p>Output 1: <span id="output1"></span></p>
    <p>Output 2: <span id="output2"></span></p>
    <p>Output 3: <span id="output3"></span></p>
    <p>Output 4: <span id="output4"></span></p>

    <div class="frame-container">
    <div class="controls">
      <button onclick="zoom(this, 0.1)">+</button>
      <button onclick="zoom(this, -0.1)">-</button>
    </div>
      <div class="iframe-wrapper" data-scale="1">
      <iframe id="myFrame1"></iframe>
      </div>
    </div>

  <div class="frame-container">
    <div class="controls">
      <button onclick="zoom(this, 0.1)">+</button>
      <button onclick="zoom(this, -0.1)">-</button>
    </div>
    <div class="iframe-wrapper" data-scale="1">
      <iframe id="myFrame2"></iframe>
    </div>
  </div>

  <div class="frame-container">
    <div class="controls">
      <button onclick="zoom(this, 0.1)">+</button>
      <button onclick="zoom(this, -0.1)">-</button>
    </div>
    <div class="iframe-wrapper" data-scale="1">
      <iframe id="myFrame3"></iframe>
    </div>
  </div>

  <div class="frame-container">
    <div class="controls">
      <button onclick="zoom(this, 0.1)">+</button>
      <button onclick="zoom(this, -0.1)">-</button>
    </div>
    <div class="iframe-wrapper" data-scale="1">
      <iframe id="myFrame4"></iframe>
    </div>
  </div>

  </body>
  <script>
    const generatedNumbers = new Set();

    function generateRandom10Digit() {
      return Math.floor(1000000000 + Math.random() * 9000000000);
    }

    function generateNumbers() {
      let results = [];

      while (results.length < 4) {
        let num = generateRandom10Digit();

        if (!generatedNumbers.has(num)) {
          generatedNumbers.add(num);
          results.push(num);
        }
      }

      // assign to separate outputs
      document.getElementById("output1").textContent = "https://apostille.mygov.bd/application-details/" + results[0];
      document.getElementById("output2").textContent = "https://apostille.mygov.bd/application-details/" + results[1];
      document.getElementById("output3").textContent = "https://apostille.mygov.bd/application-details/" + results[2];
      document.getElementById("output4").textContent = "https://apostille.mygov.bd/application-details/" + results[3];

      document.getElementById("myFrame1").src = "https://apostille.mygov.bd/application-details/" + results[0];
      document.getElementById("myFrame2").src = "https://apostille.mygov.bd/application-details/" + results[1];
      document.getElementById("myFrame3").src = "https://apostille.mygov.bd/application-details/" + results[2];
      document.getElementById("myFrame4").src = "https://apostille.mygov.bd/application-details/" + results[3];
    }
    function zoom(btn, change) {
      const wrapper = btn.parentElement.nextElementSibling;
      let scale = parseFloat(wrapper.getAttribute("data-scale"));

      scale += change;
      scale = Math.max(0.5, Math.min(scale, 3)); // limit zoom

      wrapper.style.transform = `scale(${scale})`;
      wrapper.setAttribute("data-scale", scale);
    }
  </script>
</html>
