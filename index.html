<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Single Page Form</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --card: #f4f4f4;
    }

    body.dark {
      --bg: #121212;
      --text: #ffffff;
      --card: rgba(255,255,255,0.1);
      --border: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 20px;
      transition: 0.3s;
    }

    .hidden {
      display: none;
    }

    pre {
      background: var(--card);
      padding: 15px;
      border-radius: 10px;
      overflow-x: auto;
    }

    button {
      padding: 8px 12px;
      margin-right: 5px;
      cursor: pointer;
    }

    .toggle-btn {
      margin-bottom: 20px;
    }

    .sub-menu {
      margin-left: 20px;
    }

    .menu-box {
      border: 2px solid black;
      border-radius: 8px;
      padding: 5px;
    }
  </style>
</head>
<body>

  <!-- THEME BUTTON -->
  <button class="toggle-btn" onclick="toggleTheme()">Toggle Theme</button>

  <!-- FORM SECTION -->
  <div id="formSection">
    <h2>Simple Form</h2>

    <form id="myForm">
      <label>উপজেলার নাম:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <div class="sub-menu">
        <label>ইতিহাস:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>নামকরণ:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>আয়তন:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>অবস্থান:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>ভূপ্রকৃতি:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>অর্থনীতি:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>যোগাযোগ ব্যবস্থা:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>পাঠাগার:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>পত্র-পত্রিকা ও সাময়িকী:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>সংসদীয় আসন:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>

        <label>উপজেলা পরিষদ ও প্রশাসন:</label><br>
        <textarea id="name" rows="4"></textarea><br><br>
      </div>

      <label>হাসপাতাল:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>এ্যাম্বুলেন্স:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>রক্ত দাতা:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>ডাক্তার:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>ফায়ার সার্ভিস:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>কার সার্ভিস:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>বাস সার্ভিস:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>দর্শনীয় স্থান:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>সিটিজেন চার্টার:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>কৃষি কর্মকর্তা:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>স্বাস্থ্য কর্মকর্তা:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>উকিল:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>সরকারি দপ্তর:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>ইউনিয়ন সমূহ:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>ভোটকেন্দ্র:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>কুরিয়ার সার্ভিস:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>জনসংখ্যা:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>পুলিশ:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>ব্যাংক:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>বিখ্যাত ব্যাক্তিগন:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>শিক্ষা প্রতিষ্ঠান সমূহ:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>পত্রিকা ও সাময়িকী:</label><br>
      <input type="text" id="upazila_name" required><br><br>

      <label>Email:</label><br>
      <input type="text" id="email" required><br><br>

      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </div>

  <!-- RESULT SECTION -->
  <div id="resultSection" class="hidden">
    <h2>Submitted Data (JSON)</h2>
    <pre id="output"></pre>
    <br>

    <!-- NEW BUTTONS -->
    <button onclick="copyToClipboard()">Copy JSON</button>
    <button onclick="downloadJSON()">Download JSON</button>
    <button onclick="goBack()">Back</button>
  </div>

  <script>
    const formSection = document.getElementById("formSection");
    const resultSection = document.getElementById("resultSection");

    let jsonData = "";

    // Load saved theme
    if (localStorage.getItem("theme") === "dark") {
      document.body.classList.add("dark");
    }

    function toggleTheme() {
      document.body.classList.toggle("dark");

      if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
      } else {
        localStorage.setItem("theme", "light");
      }
    }

    document.getElementById("myForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value
      };

      jsonData = JSON.stringify(data, null, 2);

      document.getElementById("output").textContent = jsonData;

      formSection.classList.add("hidden");
      resultSection.classList.remove("hidden");
    });

    function goBack() {
      resultSection.classList.add("hidden");
      formSection.classList.remove("hidden");
    }

    // COPY FUNCTION
    function copyToClipboard() {
      navigator.clipboard.writeText(jsonData)
        .then(() => alert("Copied to clipboard!"))
        .catch(() => alert("Failed to copy"));
    }

    // DOWNLOAD FUNCTION
    function downloadJSON() {
      const blob = new Blob([jsonData], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "data.json";
      a.click();

      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
